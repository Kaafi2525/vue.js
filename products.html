<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <h2>products page</h2>

    <div>
        <!-- Button trigger modal -->
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
            add products
        </button>

        <!-- Modal -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">add products</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="app">
                            <div class="mb-3">
                                <label for="exampleInputEmail1" class="form-label">product name</label>
                                <input type="text" class="form-control" id="product_name" v-mode="new_products.name"
                                    aria-describedby="emailHelp">
                                <div id="emailHelp" class="form-text">We'll never share your email with anyone else.
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="exampleInputPassword1" class="form-label">buying_price</label>
                                <input type="number" class="form-control" id="buying_price"
                                    v-mode="new_products.buying_price">
                            </div>

                            <div class="mb-3">
                                <label for="exampleInputPassword1" class="form-label">selling_price</label>
                                <input type="number" class="form-control" id="selling_price"
                                    v-mode="new_products.selling_price">
                            </div>




                        </form>
                    </div>
                    <div class="modal-footer">

                        <button type="submit" class="btn btn-success">add products</button>
                    </div>
                </div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>id</th>
                    <th>name</th>
                    <th>buying price</th>
                    <th>selling price</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>{{product.name}}</td>
                    <td>{{product.buying_price}}</td>
                    <td>{{product.selling_price}}</td>
                </tr>
            </tbody>
        </table>






        <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.7/vue.min.js"
            integrity="sha512-PhuYrdDBtBeUjY7KTmjRYFFadw8uXXdTmzZyhCHZewYsqZJ0pxFCwU528jRoil42LXMW3ksegQT5zdjkfiR1IA=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.8/axios.js"
            integrity="sha512-+dJa1RvuE8/HFftifMtr7hqixdEkb/DizfXUZAA0pyZeVdNnyZyKy9RnIWi0JSWUznbCNbaQNn0E6nbtrdL+9g=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

        <script>
            new Vue({
                el: '#app',
                data: {
                    // Define your data properties here
                    new_product: {
                        name: '',
                        buying_price: 0,
                        selling_price: 0
                    },
                    products: []
                },
                methods: {
                    // Define your methods here
                    async addProduct() {
                        const headers = { headers: { Authorization: `Bearer ${localStorage.getItem('token')}` } };
                        try {
                            const response = await axios.post('http://127.0.0.1:5000/products', {
                                name: this.newProduct.name,
                                buying_price: this.newProduct.buying_price,
                                selling_price: this.newProduct.selling_price
                            }, headers);
                            alert('Product added successfully');
                        } catch (error) {
                            console.error('Error adding product:', error);
                        }
                    },
                    async fetchProducts() {
                        const headers = { headers: { Authorization: `Bearer ${localStorage.getItem('token')}` } };
                        try {
                            const response = await axios.get('http://127.0.0.1:5000/products', headers);
                            this.products = response.data;
                        }
                        catch (error) {
                            console.error('Error fetching products:', error);
                        }
                    }
                },
                mounted() {
                    if (localStorage.getItem('token') !== null) {
                        this.fetchProducts();
                    } else {
                        window.location.href = "login.html";
                    }
                }

            });
        </script>
    </div>



</body>

</html>
