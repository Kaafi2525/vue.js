<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register | Moha Duka POS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
          <a class="navbar-brand fw-bold" href="index.html">Moha Duka POS</a>
          <div class="ms-auto">
            <a class="btn btn-outline-primary" href="login.html">Login</a>
          </div>
        </div>
      </nav>
      <main class="page-wrap">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
              <div class="card auth-card mx-auto">
                <div class="auth-head">
                  <div class="auth-icon"><i class="bi bi-person-plus"></i></div>
                  <h3 class="mt-3 mb-1">Create Account</h3>
                  <p class="mb-0">Set up access for Moha Duka POS</p>
                </div>
                <div class="card-body p-4 p-md-5">
                  <form @submit.prevent="registerUser">
                    <div
                      class="alert app-alert mb-3"
                      :class="alertClass"
                      v-if="notice.show"
                    >
                      {{ notice.message }}
                    </div>
                    <div class="mb-3">
                      <label class="form-label">Full name</label
                      ><input
                        type="text"
                        class="form-control"
                        v-model="fullname"
                        required
                      />
                    </div>
                    <div class="mb-3">
                      <label class="form-label">Email</label
                      ><input
                        type="email"
                        class="form-control"
                        v-model="email"
                        required
                      />
                    </div>
                    <div class="mb-3">
                      <label class="form-label">Password</label
                      ><input
                        type="password"
                        class="form-control"
                        v-model="password"
                        minlength="6"
                        required
                      />
                    </div>
                    <button class="btn btn-primary w-100" :disabled="saving">
                      <span v-if="saving">Creating...</span
                      ><span v-else>Create account</span>
                    </button>
                    <p class="text-center small mt-3 mb-0">
                      Already registered?
                      <a href="login.html" class="link-light fw-bold">Login</a>
                    </p>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
      <footer class="site-footer">&copy; 2026 Moha Duka POS</footer>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.7/vue.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.8/axios.min.js"></script>
    <script src="app.js"></script>
    <script>
      new Vue({
        el: "#app",
        data: {
          fullname: "",
          email: "",
          password: "",
          saving: false,
          notice: { show: false, type: "danger", message: "" },
        },
        computed: {
          alertClass() {
            return this.notice.type === "success"
              ? "alert-success"
              : "alert-danger";
          },
        },
        methods: {
          show(type, message) {
            this.notice = { show: true, type, message };
          },
          async registerUser() {
            this.saving = true;
            try {
              const response = await axios.post(
                `${API_BASE_URL}/register`,
                {
                  fullname: this.fullname,
                  email: this.email,
                  password: this.password,
                },
                { withCredentials: true },
              );
              saveToken(response);
              this.show("success", "Account created. Opening products...");
              setTimeout(() => (window.location.href = "products.html"), 500);
            } catch (error) {
              this.show(
                "danger",
                getErrorMessage(error, "Registration failed."),
              );
            } finally {
              this.saving = false;
            }
          },
        },
      });
    </script>
  </body>
</html>
